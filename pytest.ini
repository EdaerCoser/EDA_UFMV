[pytest]
# =============================================================================
# Basic Configuration
# =============================================================================
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# =============================================================================
# Plugin Configuration
# =============================================================================
# Disable pytest-qt (prevents DLL loading issues on Windows)
# Disable auto-load for more control
addopts =
    -p no:qt
    -v
    --tb=short
    --strict-markers

# =============================================================================
# Coverage Configuration
# =============================================================================
# Note: Coverage options configured in pyproject.toml for pytest-cov
# Minimum coverage threshold: 85%
# Target coverage: 90%

# =============================================================================
# Test Markers
# =============================================================================
# Run specific test categories:
#   pytest -m unit              # Unit tests only
#   pytest -m integration       # Integration tests only
#   pytest -m "P0 or P1"        # Priority tests only
#   pytest -m "not slow"        # Skip slow tests
#   pytest -m error_handling    # Exception handling tests only
markers =
    # Test Type Markers
    unit: Unit tests (fast, isolated component tests)
    integration: Integration tests (cross-component interaction)
    performance: Performance tests (timing and throughput)
    benchmark: Benchmark tests (establish performance baselines)
    regression: Regression tests (prevent reoccurring bugs)

    # Priority Markers
    P0: P0 critical tests (must pass for release)
    P1: P1 important tests (should pass for release)
    P2: P2 enhancement tests (nice to have)

    # Special Category Markers
    slow: Slow tests (require --include-slow to run)
    error_handling: Exception and error handling tests
    boundary: Boundary value and edge case tests
    cross_module: Cross-module integration tests
    end_to_end: End-to-end workflow tests

# =============================================================================
# Test Execution Settings
# =============================================================================
# Use pytest-xdist for parallel execution (when installed):
#   pytest -n auto               # Auto-detect CPU count
#   pytest -n 4                  # Use 4 workers

# Use pytest-timeout to prevent hanging (when installed):
#   pytest --timeout=300         # 5 minute timeout per test

# Use pytest-randomly for randomization (when installed):
#   Automatically randomizes test order to detect interdependence

# =============================================================================
# Output Configuration
# =============================================================================
# -v: verbose mode
# --tb=short: shorter traceback format
# --strict-markers: warn on unknown markers

# For HTML coverage report:
#   pytest --cov=sv_randomizer --cov=coverage --cov=rgm --cov-report=html

# For detailed coverage report:
#   pytest --cov-report=term-missing

# =============================================================================
# Warnings Configuration
# =============================================================================
filterwarnings =
    ignore::DeprecationWarning
    # Add specific warnings to ignore here
