name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black mypy isort

    - name: Check code formatting with Black
      run: |
        black --check --diff sv_randomizer/ coverage/ rgm/

    - name: Check import sorting with isort
      run: |
        isort --check-only --diff sv_randomizer/ coverage/ rgm/

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 sv_randomizer/ coverage/ rgm/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 sv_randomizer/ coverage/ rgm/ --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

    - name: Type check with mypy
      run: |
        mypy sv_randomizer/ --ignore-missing-imports --no-error-summary || true
        mypy coverage/ --ignore-missing-imports --no-error-summary || true
        mypy rgm/ --ignore-missing-imports --no-error-summary || true
      continue-on-error: true

  markdown-lint:
    runs-on: ubuntu-latest
    name: Markdown Lint

    steps:
    - uses: actions/checkout@v4

    - name: Lint Markdown files
      uses: actionshub/markdownlint@v3.1.2
      with:
        files: |
          **/*.md
          !.github/**/*.md
        config: |
          {
            "default": true,
            "MD024": { "siblings_only": true },
            "MD033": false,
            "MD041": false
          }
      continue-on-error: true
