name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,z3]"

    - name: Run coverage system tests
      run: |
        python run_coverage_tests.py
      env:
        # Disable pytest-qt on all platforms to avoid Windows DLL issues
        PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

    - name: Run RGM tests
      run: |
        python -m pytest tests/test_rgm/ -v --tb=short
      env:
        PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

    - name: Run legacy randomization tests
      run: |
        python -m pytest tests/legacy/ -v --tb=short
      env:
        PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

    - name: Run integration tests
      run: |
        python -m pytest tests/integration/ -v --tb=short
      env:
        PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

    - name: Generate coverage report
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
      run: |
        pip install pytest-cov
        python -m pytest tests/ --cov=sv_randomizer --cov=coverage --cov=rgm --cov-report=xml --cov-report=term
      env:
        PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-${{ matrix.os }}-py${{ matrix.python-version }}
        fail_ci_if_error: false

  test-performance:
    runs-on: ubuntu-latest
    name: Performance Benchmarks

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run performance tests
      run: |
        python -m pytest tests/performance/ -v --tb=short
      env:
        PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
